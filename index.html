<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Iframe</title>
    <style>
        /* Remove default browser padding and margin */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrollbars on the main page */
        }

        iframe {
            display: block;  /* Remove extra space below iframe */
            width: 100vw;    /* 100% of the viewport width */
            height: 100vh;   /* 100% of the viewport height */
            border: none;    /* Remove iframe border */
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbwqjzEQ1TuZ1iQiBV4EFyYBGw0YCrZ1pSZli3VY2JRSPG-AbgIy5Otr38yrYp18X5Rt/exec"
            title="Embedded Google Apps Script">
    </iframe>
</body>
</html>
